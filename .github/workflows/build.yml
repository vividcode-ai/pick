name: Build

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy, rustfmt
          cache: true

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

  build:
    needs: [check]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            archive_ext: tar.gz
          - os: macos-latest
            target: macos-x86_64
            archive_ext: tar.gz
          - os: windows-latest
            target: windows-x86_64
            archive_ext: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test --release

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          BINARY="target/release/pick${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
          cp "$BINARY" "dist/pick${{ matrix.os == 'windows-latest' && '.exe' || '' }}"
          cd dist
          tar -czf "../pick-package-${{ matrix.target }}.tar.gz" \
            pick${{ matrix.os == 'windows-latest' && '.exe' || '' }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: pick-package-${{ matrix.target }}
          path: pick-package-${{ matrix.target }}.tar.gz
          compression-level: 0
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Generate checksums
        run: |
          find . -name '*.tar.gz' -exec sha256sum {} \; > pick-package_SHA256SUMS
          cat pick-package_SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pick-package-linux-x86_64/*.tar.gz
            pick-package-macos-x86_64/*.tar.gz
            pick-package-windows-x86_64/*.tar.gz
            pick-package_SHA256SUMS
            scripts/install/install.sh
            scripts/install/install.ps1
          generate_release_notes: true
